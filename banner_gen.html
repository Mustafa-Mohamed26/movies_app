<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies App Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121112;
            --primary-color: #F6BD00;
            --text-white: #ffffff;
            --text-grey: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            width: 1200px;
            height: 400px;
        }

        .banner-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e1d1e 0%, #121112 100%);
            overflow: hidden;
        }

        /* Particles/Effects */
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 1;
        }

        .sphere-1 {
            width: 300px;
            height: 300px;
            background: var(--primary-color);
            top: -100px;
            left: -50px;
        }

        .sphere-2 {
            width: 400px;
            height: 400px;
            background: var(--primary-color);
            bottom: -200px;
            right: -100px;
        }

        /* Main Content */
        .content {
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 10;
        }

        .logo-wrapper {
            position: relative;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: float 4s ease-in-out infinite;
        }

        .logo-wrapper img {
            width: 120px;
            height: 120px;
            filter: drop-shadow(0 0 15px rgba(246, 189, 0, 0.5));
        }

        .text-content {
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #ffffff 50%, #f6bd00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 24px;
            color: var(--text-grey);
            margin-top: -5px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flutter-tag {
            background: rgba(2, 86, 155, 0.2);
            color: #40c4ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            border: 1px solid rgba(64, 196, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Abstract Elements */
        .strip {
            position: absolute;
            background: rgba(246, 189, 0, 0.05);
            height: 2px;
            width: 200%;
            transform: rotate(-35deg);
            z-index: 2;
        }

        .strip-1 { top: 20%; }
        .strip-2 { top: 40%; }
        .strip-3 { bottom: 20%; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Grid Background Effect */
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(246, 189, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(246, 189, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

    </style>
</head>
<body>
    <div class="banner-container">
        <div class="grid"></div>
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="strip strip-1"></div>
        <div class="strip strip-2"></div>
        <div class="strip strip-3"></div>

        <div class="content">
            <div class="logo-wrapper">
                <img src="assets/images/splash_logo.png" alt="Logo">
            </div>
            <div class="text-content">
                <h1>Movies App</h1>
                <div class="subtitle">
                    The Ultimate Cinematic Experience 
                    <span class="flutter-tag">Built with Flutter</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
